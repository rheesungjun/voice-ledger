<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FFF9E6" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>설정 · 가계부</title>
  <link rel="stylesheet" href="assets/css/core.css" />
  <style>
    .set-row { display: flex; align-items: center; justify-content: space-between; gap: 12px;
               padding: 14px 4px; border-bottom: 1px solid var(--border-subtle); }
    .set-row:last-child { border-bottom: none; }
    .set-row .label { font-weight: 600; font-size: 0.92rem; }
    .set-row .desc { font-size: 0.74rem; color: var(--text-tertiary); }
    .set-row .val { font-size: 0.82rem; color: var(--text-secondary); text-align: right; word-break: break-all; }
    .switch { position: relative; width: 46px; height: 26px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: var(--border-subtle); border-radius: 26px; transition: .2s; cursor: pointer; }
    .slider::before { content: ''; position: absolute; height: 20px; width: 20px; left: 3px; bottom: 3px;
                      background: #fff; border-radius: 50%; transition: .2s; }
    .switch input:checked + .slider { background: var(--accent-primary); }
    .switch input:checked + .slider::before { transform: translateX(20px); }
    .tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .tag { background: var(--bg-glass); border-radius: var(--radius-sm); padding: 5px 10px; font-size: 0.8rem; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .dot.ok { background: var(--status-done); } .dot.bad { background: var(--status-deleted); }
  </style>
</head>
<body>
  <div class="app">
    <main class="app-main">
      <div class="card">
        <div class="set-row">
          <div><div class="label">서버 연결</div><div class="desc">Apps Script 웹 앱</div></div>
          <div class="val" id="connStatus">확인 중…</div>
        </div>
        <div class="set-row">
          <div><div class="label">음성 응답 (TTS)</div><div class="desc">비서가 소리내어 확인</div></div>
          <label class="switch"><input type="checkbox" id="ttsToggle" /><span class="slider"></span></label>
        </div>
        <div class="set-row">
          <div><div class="label">미전송 항목</div><div class="desc">오프라인 시 임시 저장</div></div>
          <div style="display:flex;gap:8px;align-items:center">
            <span class="val" id="queueCount">0건</span>
            <button class="btn btn-ghost btn-sm" id="syncBtn">동기화</button>
          </div>
        </div>
      </div>

      <div class="section-title">구성원</div>
      <div class="card"><div class="tag-list" id="memberList"></div>
        <div class="desc" style="margin-top:10px;color:var(--text-tertiary);font-size:0.74rem">
          스프레드시트의 <b>members</b> 탭에서 수정 (재배포 불필요)</div></div>

      <div class="section-title">카테고리</div>
      <div class="card"><div class="tag-list" id="catList"></div>
        <div class="desc" style="margin-top:10px;color:var(--text-tertiary);font-size:0.74rem">
          스프레드시트의 <b>categories</b> 탭에서 수정</div></div>

      <div class="section-title">계정</div>
      <div class="card">
        <button class="btn btn-ghost" id="logoutBtn" style="width:100%">PIN 잠금 (로그아웃)</button>
      </div>
      <div class="empty" id="appVer"></div>
    </main>
  </div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/core.js"></script>
  <script src="assets/js/settings.js"></script>
</body>
</html>
