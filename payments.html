<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FFF9E6" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>결제수단 · 가계부</title>
  <link rel="stylesheet" href="assets/css/core.css" />
  <style>
    .month-nav { display: flex; align-items: center; justify-content: center; gap: 18px; margin-bottom: 12px; }
    .month-nav button { background: var(--bg-glass); border: 1px solid var(--border-subtle); color: var(--accent-primary);
                        border-radius: 50%; width: 38px; height: 38px; font-size: 1.1rem; cursor: pointer; }
    .month-nav .month-label { font-weight: 700; font-size: 1.05rem; min-width: 120px; text-align: center; }
    .add-form .row2 { display: flex; gap: 10px; }
    .add-form .row2 > * { flex: 1; }
    .pay-card { margin-bottom: 12px; }
    .pay-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .pay-name { font-weight: 700; font-size: 1.02rem; }
    .pay-type { font-size: 0.7rem; color: var(--text-tertiary); background: var(--bg-glass);
                padding: 2px 8px; border-radius: var(--radius-pill); margin-left: 6px; }
    .pay-actions button { background: none; border: none; cursor: pointer; font-size: 0.95rem; padding: 2px 4px; }
    .bar-track { background: var(--bg-glass); border-radius: var(--radius-pill); height: 16px; overflow: hidden; margin: 10px 0 6px; }
    .bar-fill { height: 100%; background: var(--accent-gradient); border-radius: var(--radius-pill); transition: width .4s; }
    .bar-fill.done { background: linear-gradient(135deg, var(--brand-mint), hsl(155,55%,60%)); }
    .pay-meta { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--text-secondary); }
    .pay-meta b { color: var(--text-primary); }
    .pay-benefit { font-size: 0.74rem; color: var(--text-tertiary); margin-top: 6px; }
    .badge-done { color: #fff; background: var(--status-done); font-size: 0.68rem; font-weight: 700;
                  padding: 2px 8px; border-radius: var(--radius-pill); }
  </style>
</head>
<body>
  <div class="app">
    <main class="app-main">
      <div class="month-nav">
        <button id="prevM">‹</button>
        <span class="month-label" id="monthLabel">—</span>
        <button id="nextM">›</button>
      </div>

      <div class="card add-form">
        <div class="section-title" style="margin-top:0">지불수단 추가 / 수정</div>
        <input id="pName" placeholder="이름 (예: 신한 Deep Dream)" />
        <div class="row2" style="margin-top:8px">
          <select id="pType">
            <option>카드</option><option>현금</option><option>계좌</option><option>페이</option>
          </select>
          <input id="pTarget" type="number" inputmode="numeric" placeholder="월 실적 목표(원)" />
        </div>
        <input id="pBenefit" placeholder="혜택 메모 (예: 30만원 실적 시 다음달 영화 2매)" style="margin-top:8px" />
        <button class="btn" id="pAdd" style="width:100%;margin-top:10px">저장</button>
      </div>

      <div class="section-title">이번 달 실적</div>
      <div id="payList"></div>
    </main>
  </div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/core.js"></script>
  <script src="assets/js/payments.js"></script>
</body>
</html>
