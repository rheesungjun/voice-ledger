<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#FFF9E6" />
  <link rel="manifest" href="manifest.webmanifest" />
  <title>통계 · 가계부</title>
  <link rel="stylesheet" href="assets/css/core.css" />
  <style>
    .month-nav { display: flex; align-items: center; justify-content: center; gap: 18px; margin-bottom: 12px; }
    .month-nav button { background: var(--bg-glass); border: 1px solid var(--border-subtle); color: var(--accent-primary);
                        border-radius: 50%; width: 38px; height: 38px; font-size: 1.1rem; cursor: pointer; }
    .month-nav .month-label { font-weight: 700; font-size: 1.05rem; min-width: 120px; text-align: center; }
    .bar-row { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
    .bar-row .bar-label { width: 96px; font-size: 0.82rem; flex-shrink: 0; }
    .bar-track { flex: 1; background: var(--bg-glass); border-radius: var(--radius-pill); height: 14px; overflow: hidden; }
    .bar-fill { height: 100%; background: var(--accent-gradient); border-radius: var(--radius-pill); }
    .bar-row .bar-val { width: 90px; text-align: right; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
    .payer-split { display: flex; gap: 12px; }
    .payer-split .stat-card { flex: 1; }
    .settle { text-align: center; font-size: 0.85rem; color: var(--text-secondary); margin-top: 12px; }
    .settle b { color: var(--accent-primary); }
  </style>
</head>
<body>
  <div class="app">
    <main class="app-main">
      <div class="month-nav">
        <button id="prevM">‹</button>
        <span class="month-label" id="monthLabel">—</span>
        <button id="nextM">›</button>
      </div>

      <div class="card stat-card"><div class="stat-label">이 달 총지출</div><div class="stat-value" id="total">₩0</div></div>

      <div class="section-title">지출자별</div>
      <div class="payer-split" id="payerSplit"></div>
      <div class="settle" id="settle"></div>

      <div class="section-title">카테고리별</div>
      <div class="card" id="catBars"></div>
    </main>
  </div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/core.js"></script>
  <script src="assets/js/stats.js"></script>
</body>
</html>
